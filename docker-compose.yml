services:
  php:
    image: presensi-php:latest

    container_name: presensi-php

    volumes:
      - .:/var/www

  nginx:
    image: nginx:latest

    container_name: presensi-nginx

    ports:
      - "8080:80"

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php
